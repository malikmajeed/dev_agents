name: DevAgent — Self-Healing Developer

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      force_feature:
        description: "Force a specific feature (leave blank for auto)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dev-agent-${{ github.repository }}
  cancel-in-progress: false

jobs:
  dev-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEVAGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "DevAgent"
          git config user.email "dev-agent@noreply.local"

      - name: Sync repo with remote
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          git fetch origin
          git pull --rebase origin "$branch" || {
            echo "::warning::Rebase failed — resetting to origin/$branch"
            git rebase --abort 2>/dev/null || true
            git reset --hard "origin/$branch"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests pynacl

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install app deps
        run: |
          if [ -f package.json ]; then
            npm ci --prefer-offline 2>/dev/null || npm install
          fi

      - name: Run DevAgent orchestrator
        env:
          HF_API_KEY:           ${{ secrets.HF_API_KEY }}
          HF_MODEL:             ${{ vars.HF_MODEL || 'openai/gpt-oss-120b:fastest' }}

          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAIL:         ${{ vars.NOTIFY_EMAIL || secrets.GMAIL_USER }}

          MAX_HEAL_RETRIES:     ${{ vars.MAX_HEAL_RETRIES || '3' }}
          FORCE_FEATURE:        ${{ github.event.inputs.force_feature }}

          GITHUB_TOKEN:         ${{ secrets.DEVAGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}

          REPO_ROOT:            ${{ github.workspace }}
        run: |
          cd dev_agent
          python orchestrator.py

      - name: Collect run artifacts
        if: always()
        run: |
          mkdir -p run-artifacts
          for f in PROGRESS.md FEATURES.md TECHSTACK.md ENV_REGISTRY.md REPOS.md PROJECT.md; do
            if [ -f "$f" ]; then
              cp "$f" run-artifacts/
              echo "Collected: $f"
            fi
          done

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devagent-run-${{ github.run_number }}
          path: run-artifacts/
          if-no-files-found: ignore
          retention-days: 14
